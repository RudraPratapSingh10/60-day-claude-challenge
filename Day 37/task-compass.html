<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Task Compass — Tech Company</title>
<style>
  :root{
    --bg:#080b11;
    --bg-elev:#0f1522;
    --surface: rgba(255,255,255,.045);
    --surface-strong: rgba(255,255,255,.09);
    --border: rgba(255,255,255,.10);
    --text:#eaeef5;
    --muted:#8892a4;
    --accent:#5b9ef3;
    --good:#5fd9a0;
    --warn:#f2b84b;
    --bad:#f0777a;
    --frontend:#5b9ef3;
    --backend:#8b7fe8;
    --qa:#4ecdc4;
    --product:#f4a340;
    --design:#f07198;
    --support:#6edb8f;
    --engmanager:#e85d5d;
    --devops:#c9a96e;
    --radius:18px;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #bgCanvas{
    position:fixed; inset:0; width:100%; height:100%; z-index:0; opacity:.55;
  }
  #app{ position:relative; z-index:1; max-width:960px; margin:0 auto; padding:20px 18px 80px; }

  /* ---------- topbar ---------- */
  .topbar{ padding:18px 0 8px; }
  .brand-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .compass-mark{
    font-size:26px; display:inline-flex; align-items:center; justify-content:center;
    width:46px; height:46px; border-radius:14px;
    background: linear-gradient(155deg, rgba(91,158,243,.25), rgba(139,127,232,.15));
    border:1px solid var(--border);
    animation: spin-slow 18s linear infinite;
  }
  @keyframes spin-slow{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  .brand-name{ font-weight:800; font-size:19px; letter-spacing:.2px; }
  .brand-sub{ font-size:12.5px; color:var(--muted); margin-top:1px; }
  .workplace-tag{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--accent); background:rgba(91,158,243,.10); border:1px solid rgba(91,158,243,.30);
    padding:6px 12px; border-radius:999px;
  }
  .progress-wrap{ display:flex; gap:8px; margin-top:18px; }
  .progress-stage{ flex:1; display:flex; flex-direction:column; gap:6px; }
  .progress-stage-label{ font-size:10.5px; font-family:var(--mono); text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .progress-dots{ display:flex; gap:5px; }
  .progress-dot{ flex:1; height:6px; border-radius:4px; background:var(--surface-strong); overflow:hidden; }
  .progress-dot i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--qa)); transition:width .5s ease; }
  .progress-stage.active .progress-stage-label{ color:var(--text); }

  /* ---------- generic ---------- */
  main{ margin-top:22px; }
  .screen{ animation: rise .45s cubic-bezier(.2,.8,.2,1); }
  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .card-panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:24px; backdrop-filter: blur(14px);
  }
  h1{ font-size:26px; margin:0 0 8px; letter-spacing:-.01em; }
  h2{ font-size:19px; margin:0 0 6px; }
  p{ color:var(--muted); line-height:1.55; margin:0 0 10px; }
  .eyebrow{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--accent); margin-bottom:10px; }
  .btn{
    font-family:var(--sans); font-weight:700; font-size:14.5px; border:none; cursor:pointer;
    padding:13px 22px; border-radius:12px; color:#081018;
    background:linear-gradient(135deg,var(--accent),#7fd6d0);
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow:0 8px 22px rgba(91,158,243,.22);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(91,158,243,.32); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost{
    background:transparent; color:var(--text); border:1px solid var(--border);
    box-shadow:none; font-weight:600;
  }
  .btn-ghost:hover{ background:var(--surface-strong); transform:translateY(-2px); box-shadow:none; }
  .btn-row{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }

  /* ---------- start screen ---------- */
  .start-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:18px 0 4px; }
  .start-pill{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 10px; text-align:center; font-size:12.5px; color:var(--muted); }
  .start-pill b{ display:block; color:var(--text); font-size:13.5px; margin-bottom:2px; }
  @media(max-width:640px){ .start-grid{ grid-template-columns:repeat(2,1fr); } }

  /* ---------- ticket / task card ---------- */
  .ticket{
    position:relative; background:var(--bg-elev); border:1px solid var(--border);
    border-radius:16px; padding:22px 26px; margin-bottom:20px; overflow:visible;
    border-left:4px dashed rgba(255,255,255,.18);
  }
  .ticket::before,.ticket::after{
    content:""; position:absolute; width:18px; height:18px; background:var(--bg); border-radius:50%;
    top:50%; transform:translateY(-50%); border:1px solid var(--border);
  }
  .ticket::before{ left:-10px; } .ticket::after{ right:-10px; }
  .ticket-id{ font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.05em; }
  .ticket-text{ font-size:18px; font-weight:600; margin-top:6px; line-height:1.4; }

  /* ---------- role cards ---------- */
  .role-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
  @media(max-width:720px){ .role-grid{ grid-template-columns:repeat(2,1fr);} }
  .role-card{
    --c: var(--accent);
    position:relative; background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:14px 12px 12px; text-align:center; cursor:grab; user-select:none;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
  }
  .role-card::before{
    content:""; position:absolute; left:10px; right:10px; top:0; height:3px; border-radius:0 0 4px 4px;
    background:var(--c); opacity:.85;
  }
  .role-card:hover{ transform:translateY(-3px); border-color:var(--c); box-shadow:0 10px 24px -8px var(--c); }
  .role-card.dragging{ opacity:.35; }
  .role-card.picked{ outline:2px solid var(--c); background:var(--surface-strong); }
  .role-card.used{ opacity:.3; pointer-events:none; }
  .role-icon{ font-size:24px; display:block; margin-bottom:6px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.35)); }
  .role-name{ font-size:12.5px; font-weight:700; line-height:1.25; }

  /* ---------- stage1 slot ---------- */
  .slot{
    margin-top:6px; border:2px dashed var(--border); border-radius:16px; min-height:88px;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:14px;
    color:var(--muted); font-size:13.5px; transition: border-color .2s ease, background .2s ease;
  }
  .slot.dragover{ border-color:var(--accent); background:rgba(91,158,243,.08); }
  .slot.filled{ border-style:solid; border-color:var(--accent); background:rgba(91,158,243,.06); color:var(--text); }
  .slot-filled-inner{ display:flex; align-items:center; gap:10px; font-weight:700; }
  .slot-filled-inner .role-icon{ font-size:22px; margin:0; }

  /* ---------- reveal ---------- */
  .reveal{ margin-top:18px; border-radius:16px; padding:18px 20px; border:1px solid var(--border); background:var(--surface); animation: rise .4s ease; }
  .reveal-row{ display:flex; gap:10px; margin-bottom:10px; align-items:flex-start; }
  .reveal-badge{ font-size:16px; flex-shrink:0; margin-top:1px; }
  .reveal-label{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:3px; }
  .chip-row{ display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
  .chip{ font-size:12px; font-weight:700; padding:5px 10px; border-radius:999px; background:var(--surface-strong); border:1px solid var(--border); display:inline-flex; align-items:center; gap:5px; }

  /* ---------- stage2 route ---------- */
  .route-track{ display:flex; align-items:stretch; gap:4px; margin:18px 0; flex-wrap:wrap; }
  .route-slot{
    flex:1; min-width:110px; position:relative; border:2px dashed var(--border); border-radius:14px;
    padding:14px 8px; text-align:center; min-height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:border-color .2s ease, background .2s ease;
  }
  .route-slot .step-num{ position:absolute; top:6px; left:8px; font-family:var(--mono); font-size:10px; color:var(--muted); }
  .route-slot.dragover{ border-color:var(--accent); background:rgba(91,158,243,.08); }
  .route-slot.filled{ border-style:solid; border-color:var(--c,var(--accent)); background:rgba(255,255,255,.03); }
  .route-slot .role-icon{ font-size:22px; margin-bottom:4px; }
  .route-slot .role-name{ font-size:11px; }
  .route-arrow{ align-self:center; color:var(--muted); font-size:18px; padding:0 2px; }
  .route-dot{
    position:absolute; width:10px; height:10px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 12px 3px var(--accent); top:50%; left:8px; transform:translateY(-50%);
    opacity:0; transition:left 1.4s cubic-bezier(.4,0,.2,1), opacity .2s ease;
  }
  .route-track.animating .route-dot{ opacity:1; }
  .route-slot.correct{ border-color:var(--good); }
  .route-slot.incorrect{ border-color:var(--bad); }

  /* ---------- stage3 tray ---------- */
  .tray{
    display:flex; gap:10px; flex-wrap:wrap; min-height:70px; border:2px dashed var(--border); border-radius:16px;
    padding:14px; margin:14px 0; transition:border-color .2s ease, background .2s ease;
  }
  .tray.dragover{ border-color:var(--accent); background:rgba(91,158,243,.08); }
  .tray-empty{ color:var(--muted); font-size:13px; margin:auto; }
  .tray-chip{
    display:flex; align-items:center; gap:8px; padding:8px 12px 8px 10px; border-radius:12px;
    background:var(--surface-strong); border:1px solid var(--border); font-weight:700; font-size:13px; animation: pop .25s ease;
  }
  @keyframes pop{ from{transform:scale(.7); opacity:0;} to{transform:scale(1); opacity:1;} }
  .tray-chip button{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; line-height:1; padding:0 0 0 4px; }
  .tray-chip button:hover{ color:var(--bad); }
  .tray-count{ font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:-6px; margin-bottom:10px; }

  /* ---------- results ---------- */
  .bar-row{ margin-bottom:16px; }
  .bar-label-row{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:6px; }
  .bar-track{ height:12px; border-radius:8px; background:var(--surface-strong); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:8px; width:0%; transition:width 1.1s cubic-bezier(.2,.9,.2,1); }
  .reflect-block{ margin-top:8px; padding:14px 16px; border-radius:14px; background:var(--surface); border:1px solid var(--border); margin-bottom:10px; }
  .reflect-block .eyebrow{ margin-bottom:4px; }
  .reflect-block p{ margin:0; color:var(--text); font-size:14px; }

  /* misc */
  .center{ text-align:center; }
  .muted-small{ font-size:12px; color:var(--muted); font-family:var(--mono); }
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translate(-50%,20px); background:var(--bg-elev);
    border:1px solid var(--border); padding:10px 18px; border-radius:12px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .3s ease, transform .3s ease; z-index:40;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .confetti-layer{ position:fixed; inset:0; pointer-events:none; z-index:30; overflow:hidden; }
  .confetti-piece{ position:absolute; top:-20px; border-radius:2px; animation: fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(340deg); opacity:.2; } }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="app">
  <header class="topbar">
    <div class="brand-row">
      <div class="brand">
        <span class="compass-mark">🧭</span>
        <div>
          <div class="brand-name">Task Compass</div>
          <div class="brand-sub">Learn how work flows through real organizations.</div>
        </div>
      </div>
      <div class="workplace-tag">Tech Company</div>
    </div>
    <div class="progress-wrap" id="progressWrap"></div>
  </header>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>
<div class="confetti-layer" id="confettiLayer"></div>

<script>
(function(){
"use strict";

/* ============================= DATA ============================= */

var ROLES = [
  {id:'frontend',   name:'Frontend Developer',   icon:'🖥️', c:'var(--frontend)'},
  {id:'backend',    name:'Backend Developer',    icon:'⚙️', c:'var(--backend)'},
  {id:'qa',         name:'QA Engineer',          icon:'🔍', c:'var(--qa)'},
  {id:'product',    name:'Product Manager',      icon:'📋', c:'var(--product)'},
  {id:'design',     name:'UX Designer',          icon:'🎨', c:'var(--design)'},
  {id:'support',    name:'Customer Support',     icon:'🎧', c:'var(--support)'},
  {id:'engmanager', name:'Engineering Manager',  icon:'🧭', c:'var(--engmanager)'},
  {id:'devops',     name:'DevOps Engineer',      icon:'🔧', c:'var(--devops)'}
];
function role(id){ for(var i=0;i<ROLES.length;i++){ if(ROLES[i].id===id) return ROLES[i]; } return null; }

var STAGE1_POOL = [
  {task:"A customer reports that payments fail only on iPhones.", owner:'frontend',
   why:"The bug shows up in how the app behaves on one specific client platform, which is the Frontend Developer's domain — they own diagnosing and fixing platform-specific issues.", assist:['qa','backend']},
  {task:"The database is returning slow query results during peak hours.", owner:'backend',
   why:"Query performance and the data layer live in backend code, so the Backend Developer owns tracking down and optimizing the slowdown.", assist:['devops','engmanager']},
  {task:"Users say the new checkout flow is confusing.", owner:'design',
   why:"Confusion in a flow is a usability problem at its core, so the UX Designer owns researching what's unclear and redesigning it.", assist:['product','frontend']},
  {task:"A critical bug just went live and the production site is down.", owner:'devops',
   why:"An active outage is an infrastructure and deployment emergency, so DevOps owns restoring service as fast as possible.", assist:['backend','engmanager']},
  {task:"The team needs to decide which features ship in the next release.", owner:'product',
   why:"Deciding what gets built and shipped is a prioritization call that balances customer value and business goals — that's the Product Manager's job.", assist:['engmanager','design']},
  {task:"A customer is angry about being charged twice and wants a refund.", owner:'support',
   why:"Direct customer communication and resolving a billing complaint is owned by Customer Support, who can loop others in if needed.", assist:['backend','product']},
  {task:"New feature code needs to be verified before it goes live.", owner:'qa',
   why:"Verifying that code meets quality standards before release is the core responsibility of QA.", assist:['frontend','backend']},
  {task:"Two engineers disagree on the technical approach for a new service.", owner:'engmanager',
   why:"Resolving technical disagreements and setting direction for the engineering team falls to the Engineering Manager.", assist:['backend','devops']},
  {task:"The onboarding flow has a high drop-off rate.", owner:'design',
   why:"A steep drop-off through a flow usually points to a usability issue, which the UX Designer investigates and redesigns.", assist:['product','frontend']},
  {task:"The mobile app crashes on older Android devices.", owner:'frontend',
   why:"Client-side crashes tied to specific devices are a frontend engineering issue to diagnose and fix.", assist:['qa','backend']}
];

var STAGE2_POOL = [
  {task:"A user reports a login bug through the support chat.", route:['support','qa','backend','devops'],
   why:"Support captures and triages the report first, QA reproduces and confirms it's a real bug, Backend fixes the root cause, and DevOps deploys the fix to production."},
  {task:"Product wants to launch a redesigned pricing page.", route:['product','design','frontend','qa'],
   why:"Product defines the goals and requirements, UX Design shapes the new layout and flow, Frontend builds it, and QA verifies it before launch."},
  {task:"A backend service needs an urgent hotfix deployed.", route:['backend','qa','devops'],
   why:"Backend writes the fix, QA quickly verifies it doesn't break anything else, and DevOps deploys it safely to production."},
  {task:"The team is planning a new onboarding feature from scratch.", route:['product','design','frontend','backend','qa'],
   why:"Product scopes the feature, Design shapes the experience, Frontend and Backend build the client and server pieces, and QA verifies the finished feature end-to-end."},
  {task:"Support flagged a recurring complaint pattern from customers.", route:['support','product','engmanager','backend'],
   why:"Support surfaces the pattern from real conversations, Product assesses its priority, the Engineering Manager scopes the technical work, and Backend implements the fix."},
  {task:"A security vulnerability was discovered in production.", route:['devops','backend','qa','engmanager'],
   why:"DevOps contains the immediate exposure, Backend patches the vulnerable code, QA verifies the patch, and the Engineering Manager oversees the incident response and follow-up."}
];

var STAGE3_POOL = [
  {task:"Customer satisfaction suddenly drops.", primary:'product', supporting:['support','design','engmanager'],
   reasoning:"This is a broad signal that something in the experience isn't working, so Product needs to lead the investigation — but the real cause could be usability, technical performance, or a support process, so several teams need to weigh in before jumping to a fix.",
   commFlow:"Support shares the complaint patterns they're hearing → Product looks for trends across the data → UX Design checks whether a flow has gotten harder to use → Engineering Manager checks for technical causes → Product decides what to prioritize."},
  {task:"Sales increase dramatically.", primary:'engmanager', supporting:['devops','backend','product'],
   reasoning:"A surge in demand is exciting, but it's fundamentally a capacity question first — if the system can't handle the load, fast growth turns into a crisis instead of a win.",
   commFlow:"Product flags the growth and what's driving it → Engineering Manager coordinates a scaling plan → DevOps scales infrastructure to handle the load → Backend optimizes the code paths under the most strain."},
  {task:"Negative reviews appear online calling the app confusing.", primary:'design', supporting:['product','support','frontend'],
   reasoning:"Confusion is a usability signal, so UX Design should lead the response — but understanding which flow is the problem and fixing it takes input from the people who talk to customers and the people who build the interface.",
   commFlow:"Support relays what's showing up in reviews and tickets → UX Design audits the flagged flow → Product decides how urgent the redesign is → Frontend implements the changes."},
  {task:"A major feature is delayed close to launch.", primary:'engmanager', supporting:['product','backend','frontend','qa'],
   reasoning:"When a launch is at risk, someone needs to own the tradeoffs across scope, timeline, and capacity — that's the Engineering Manager. But the decision affects what gets built, tested, and promised, so the full team needs to be involved.",
   commFlow:"Engineering Manager assesses what's blocking the launch → Product decides what can be trimmed or delayed → Backend and Frontend focus on the critical path → QA adjusts the testing plan to match the new scope."},
  {task:"A competitor launches a similar product at a lower price.", primary:'product', supporting:['engmanager','design','support'],
   reasoning:"Responding to competitive pressure is a strategic product question, but a good answer usually blends what's technically realistic, what makes the experience better, and what customers are actually reacting to.",
   commFlow:"Product reassesses the roadmap and positioning → Engineering Manager evaluates what's feasible to build quickly → UX Design looks for ways to differentiate the experience → Support gathers direct customer feedback on pricing concerns."},
  {task:"The app goes down during a major product launch.", primary:'devops', supporting:['backend','engmanager','support'],
   reasoning:"An active outage is first and foremost an infrastructure emergency, so DevOps leads the immediate response — but resolving it well and communicating it well takes more than one team.",
   commFlow:"DevOps works to restore service as fast as possible → Backend investigates the underlying root cause → Engineering Manager coordinates the incident response → Support keeps customers informed of the status."}
];

/* ============================= STATE ============================= */

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function pickN(pool,n){ return shuffle(pool).slice(0,n); }

var S = {
  stage:0, // 0 start, 1,2,3 stages, 4 results
  idx:0,
  tasks1: pickN(STAGE1_POOL,3),
  tasks2: pickN(STAGE2_POOL,3),
  tasks3: pickN(STAGE3_POOL,3),
  answers1: [], // {chosen, task}
  answers2: [], // {order, task}
  answers3: [], // {chosen[], task}
  submitted:false,
  dragRoleId:null,
  picked:null // clicked-to-select role id, for touch fallback
};

var main = document.getElementById('main');
var toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
}

/* ============================= SOUND ============================= */
var actx = null;
function beep(freq,dur,vol){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    var o = actx.createOscillator();
    var g = actx.createGain();
    o.type='sine'; o.frequency.value=freq||600;
    g.gain.value = vol||0.05;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + (dur||0.15));
    o.stop(actx.currentTime + (dur||0.15) + 0.02);
  }catch(e){ /* silent no-op if audio unavailable */ }
}

/* ============================= PROGRESS BAR ============================= */
function renderProgress(){
  var wrap = document.getElementById('progressWrap');
  var stages = [
    {n:1,label:'Stage 1 · Ownership'},
    {n:2,label:'Stage 2 · Routing'},
    {n:3,label:'Stage 3 · Collaboration'}
  ];
  var html = '';
  stages.forEach(function(st){
    var doneCount = 0;
    if(S.stage > st.n) doneCount = 3;
    else if(S.stage === st.n) doneCount = S.idx + (S.submitted?1:0);
    var dots = '';
    for(var i=0;i<3;i++){
      var pct = i < doneCount ? 100 : 0;
      dots += '<div class="progress-dot"><i style="width:'+pct+'%"></i></div>';
    }
    html += '<div class="progress-stage'+(S.stage===st.n?' active':'')+'">'+
      '<div class="progress-stage-label">'+st.label+'</div>'+
      '<div class="progress-dots">'+dots+'</div></div>';
  });
  wrap.innerHTML = html;
}

/* ============================= START SCREEN ============================= */
function renderStart(){
  main.innerHTML =

      '<p>You are stepping into a growing tech company for one day. Work will land on your desk the way it really does — ambiguous, urgent, and rarely belonging to just one person. Your job is not to memorize job titles. It\'s to build a feel for ownership, delegation, workflow and collaboration.</p>'+

/* ============================= STAGE 1 ============================= */
function renderStage1(){
  var t = S.tasks1[S.idx];
  var chosen = S.submitted ? S.answers1[S.idx].chosen : null;

  var roleCards = ROLES.map(function(r){
    var isChosen = chosen === r.id;
    return '<div class="role-card'+(isChosen?' picked':'')+'" draggable="'+(!S.submitted)+'" data-role="'+r.id+'" style="--c:'+r.c+'">'+
      '<span class="role-icon">'+r.icon+'</span><span class="role-name">'+r.name+'</span></div>';
  }).join('');

  var slotInner = chosen ?
    ('<div class="slot-filled-inner"><span class="role-icon">'+role(chosen).icon+'</span>'+role(chosen).name+'</div>') :
    'Drag a role here — or tap a card, then tap this box';

  var revealHtml = '';
  if(S.submitted){
    var isCorrect = chosen === t.owner;
    var ownerRole = role(t.owner);
    var assistChips = t.assist.map(function(id){ var r=role(id); return '<span class="chip"><span>'+r.icon+'</span>'+r.name+'</span>'; }).join('');
    revealHtml =
      '<div class="reveal">'+
        '<div class="reveal-row"><span class="reveal-badge">'+ownerRole.icon+'</span><div>'+
          '<div class="reveal-label">Primary Owner</div>'+
          '<div style="font-weight:800;">'+ownerRole.name+(isCorrect?' <span style="color:var(--good);font-size:12px;font-weight:700;">— that\'s who you picked</span>':' <span style="color:var(--warn);font-size:12px;font-weight:700;">— you picked '+role(chosen).name+'</span>')+'</div>'+
        '</div></div>'+
        '<div class="reveal-row"><span class="reveal-badge">💡</span><div>'+
          '<div class="reveal-label">Why they own it</div><p style="margin:0;color:var(--text);">'+t.why+'</p>'+
        '</div></div>'+
        '<div class="reveal-row"><span class="reveal-badge">🤝</span><div>'+
          '<div class="reveal-label">Who may assist</div><div class="chip-row">'+assistChips+'</div>'+
        '</div></div>'+
      '</div>';
  }

  var isLast = S.idx === S.tasks1.length-1;

  main.innerHTML =
    '<div class="screen">'+
      '<div class="ticket"><div class="ticket-id">TICKET #TC-'+(101+S.idx)+' · Stage 1 of 3</div><div class="ticket-text">'+t.task+'</div></div>'+
      '<h2>Who owns this?</h2><p>Drag the one role that should be the primary owner into the box below.</p>'+
      '<div class="slot" id="ownerSlot">'+slotInner+'</div>'+
      '<div class="role-grid" id="roleGrid">'+roleCards+'</div>'+
      revealHtml+
      '<div class="btn-row">'+
        (!S.submitted ? '<button class="btn" id="submitBtn" disabled>Submit ownership</button>' :
          '<button class="btn" id="nextBtn">'+(isLast?'Continue to Stage 2 →':'Next task →')+'</button>')+
      '</div>'+
      '<div class="center muted-small" style="margin-top:14px;">Task '+(S.idx+1)+' of '+S.tasks1.length+'</div>'+
    '</div>';

  wireStage1();
}

function wireStage1(){
  var slot = document.getElementById('ownerSlot');
  var cards = Array.prototype.slice.call(document.querySelectorAll('#roleGrid .role-card'));
  var submitBtn = document.getElementById('submitBtn');

  function place(roleId){
    if(S.submitted) return;
    S._s1choice = roleId;
    slot.classList.add('filled');
    slot.innerHTML = '<div class="slot-filled-inner"><span class="role-icon">'+role(roleId).icon+'</span>'+role(roleId).name+'</div>';
    cards.forEach(function(c){ c.classList.toggle('picked', c.getAttribute('data-role')===roleId); });
    if(submitBtn) submitBtn.disabled = false;
    beep(520,.08,.03);
  }

  cards.forEach(function(c){
    c.addEventListener('dragstart', function(e){
      c.classList.add('dragging');
      e.dataTransfer.setData('text/plain', c.getAttribute('data-role'));
    });
    c.addEventListener('dragend', function(){ c.classList.remove('dragging'); });
    c.addEventListener('click', function(){ place(c.getAttribute('data-role')); });
  });

  slot.addEventListener('dragover', function(e){ if(S.submitted) return; e.preventDefault(); slot.classList.add('dragover'); });
  slot.addEventListener('dragleave', function(){ slot.classList.remove('dragover'); });
  slot.addEventListener('drop', function(e){
    e.preventDefault(); slot.classList.remove('dragover');
    if(S.submitted) return;
    var rid = e.dataTransfer.getData('text/plain');
    if(rid) place(rid);
  });

  if(submitBtn){
    submitBtn.addEventListener('click', function(){
      if(!S._s1choice) return;
      S.submitted = true;
      S.answers1[S.idx] = { chosen: S._s1choice, task: S.tasks1[S.idx] };
      beep(760,.14,.05);
      renderAll();
    });
  }
  var nextBtn = document.getElementById('nextBtn');
  if(nextBtn){
    nextBtn.addEventListener('click', function(){
      S._s1choice = null;
      if(S.idx < S.tasks1.length-1){ S.idx++; S.submitted=false; }
      else { S.stage = 2; S.idx = 0; S.submitted = false; }
      renderAll();
    });
  }
}

/* ============================= STAGE 2 ============================= */
function renderStage2(){
  var t = S.tasks2[S.idx];
  var n = t.route.length;
  var order = S.submitted ? S.answers2[S.idx].order : (S._s2order || new Array(n).fill(null));
  S._s2order = order;

  var usedIds = order.filter(function(x){return x;});
  var pool = shuffle(t.route.slice());
  // stable pool order across renders
  if(!S._s2pool || S._s2pool.length !== n){ S._s2pool = pool; }
  pool = S._s2pool;

  var slotsHtml = '';
  for(var i=0;i<n;i++){
    var filled = order[i];
    var cls = 'route-slot' + (filled?' filled':'');
    if(S.submitted){
      cls += (filled === t.route[i]) ? ' correct' : ' incorrect';
    }
    var inner = filled ?
      ('<span class="role-icon">'+role(filled).icon+'</span><span class="role-name">'+role(filled).name+'</span>') :
      '<span class="muted-small">drop role</span>';
    var styleC = filled ? ' style="--c:'+role(filled).c+'"' : '';
    slotsHtml += '<div class="'+cls+'" data-slot="'+i+'"'+styleC+'><span class="step-num">STEP '+(i+1)+'</span>'+inner+'</div>';
    if(i<n-1) slotsHtml += '<div class="route-arrow">→</div>';
  }

  var poolHtml = pool.map(function(rid){
    var r = role(rid);
    var isUsed = usedIds.indexOf(rid) > -1;
    return '<div class="role-card'+(isUsed?' used':'')+'" draggable="'+(!S.submitted && !isUsed)+'" data-role="'+rid+'" style="--c:'+r.c+'">'+
      '<span class="role-icon">'+r.icon+'</span><span class="role-name">'+r.name+'</span></div>';
  }).join('');

  var revealHtml = '';
  if(S.submitted){
    var correctCount = 0;
    for(var k=0;k<n;k++){ if(order[k]===t.route[k]) correctCount++; }
    revealHtml =
      '<div class="reveal">'+
        '<div class="reveal-row"><span class="reveal-badge">'+(correctCount===n?'✅':'🔎')+'</span><div>'+
          '<div class="reveal-label">Result</div>'+
          '<div style="font-weight:800;">'+correctCount+' of '+n+' steps matched the common path</div>'+
        '</div></div>'+
        '<div class="reveal-row"><span class="reveal-badge">💡</span><div>'+
          '<div class="reveal-label">Why this order is common</div><p style="margin:0;color:var(--text);">'+t.why+'</p>'+
        '</div></div>'+
      '</div>';
  }

  var isLast = S.idx === S.tasks2.length-1;

  main.innerHTML =
    '<div class="screen">'+
      '<div class="ticket"><div class="ticket-id">TICKET #TC-'+(201+S.idx)+' · Stage 2 of 3</div><div class="ticket-text">'+t.task+'</div></div>'+
      '<h2>Build the workflow</h2><p>Drag the roles into the order the task should flow through the org.</p>'+
      '<div class="route-track" id="routeTrack">'+slotsHtml+'</div>'+
      '<div class="role-grid" id="roleGrid2">'+poolHtml+'</div>'+
      revealHtml+
      '<div class="btn-row">'+
        (!S.submitted ? '<button class="btn" id="submitBtn2" disabled>Submit workflow</button>' :
          '<button class="btn" id="nextBtn2">'+(isLast?'Continue to Stage 3 →':'Next task →')+'</button>')+
        (!S.submitted ? '<button class="btn btn-ghost" id="resetBtn2">Clear</button>' : '')+
      '</div>'+
      '<div class="center muted-small" style="margin-top:14px;">Task '+(S.idx+1)+' of '+S.tasks2.length+'</div>'+
    '</div>';

  wireStage2(t,n);
}

function wireStage2(t,n){
  var slots = Array.prototype.slice.call(document.querySelectorAll('.route-slot'));
  var cards = Array.prototype.slice.call(document.querySelectorAll('#roleGrid2 .role-card'));
  var submitBtn = document.getElementById('submitBtn2');
  var resetBtn = document.getElementById('resetBtn2');

  function refreshSubmit(){
    var full = S._s2order.every(function(x){return x;});
    if(submitBtn) submitBtn.disabled = !full;
  }

  function placeInto(roleId, slotIndex){
    if(S.submitted) return;
    if(S._s2order.indexOf(roleId) > -1) return; // already used
    if(slotIndex === undefined || slotIndex === null){
      slotIndex = S._s2order.indexOf(null);
    }
    if(slotIndex === -1 || S._s2order[slotIndex]) return;
    S._s2order[slotIndex] = roleId;
    beep(520,.08,.03);
    renderStage2();
  }

  cards.forEach(function(c){
    if(c.classList.contains('used')) return;
    c.addEventListener('dragstart', function(e){
      c.classList.add('dragging');
      e.dataTransfer.setData('text/plain', c.getAttribute('data-role'));
    });
    c.addEventListener('dragend', function(){ c.classList.remove('dragging'); });
    c.addEventListener('click', function(){ placeInto(c.getAttribute('data-role')); });
  });

  slots.forEach(function(s){
    var idx = parseInt(s.getAttribute('data-slot'),10);
    s.addEventListener('dragover', function(e){ if(S.submitted) return; e.preventDefault(); s.classList.add('dragover'); });
    s.addEventListener('dragleave', function(){ s.classList.remove('dragover'); });
    s.addEventListener('drop', function(e){
      e.preventDefault(); s.classList.remove('dragover');
      if(S.submitted) return;
      var rid = e.dataTransfer.getData('text/plain');
      if(rid) placeInto(rid, idx);
    });
    s.addEventListener('click', function(){
      if(S.submitted) return;
      if(S._s2order[idx]){ S._s2order[idx] = null; renderStage2(); }
    });
  });

  refreshSubmit();

  if(resetBtn){
    resetBtn.addEventListener('click', function(){
      S._s2order = new Array(n).fill(null);
      renderStage2();
    });
  }

  if(submitBtn){
    submitBtn.addEventListener('click', function(){
      S.submitted = true;
      S.answers2[S.idx] = { order: S._s2order.slice(), task: t };
      beep(760,.14,.05);
      renderAll();
      animateRoute();
    });
  }
  var nextBtn = document.getElementById('nextBtn2');
  if(nextBtn){
    nextBtn.addEventListener('click', function(){
      S._s2order = null; S._s2pool = null;
      if(S.idx < S.tasks2.length-1){ S.idx++; S.submitted=false; }
      else { S.stage = 3; S.idx = 0; S.submitted = false; }
      renderAll();
    });
  }
}

function animateRoute(){
  var track = document.getElementById('routeTrack');
  if(!track) return;
  var dot = document.createElement('div');
  dot.className = 'route-dot';
  track.appendChild(dot);
  requestAnimationFrame(function(){
    track.classList.add('animating');
    dot.style.left = '8px';
    requestAnimationFrame(function(){
      var w = track.getBoundingClientRect().width;
      setTimeout(function(){ dot.style.left = (w-24)+'px'; }, 30);
      setTimeout(function(){ dot.style.opacity = '0'; }, 1500);
    });
  });
}

          '<div class="reveal-label">Reasoning</div><p style="margin:0;color:var(--text);">'+t.reasoning+'</p>'+
        '</div></div>'+

        '</div></div>'+
      '</div>';

  var isLast = S.idx === S.tasks3.length-1;

  main.innerHTML =
    '<div class="screen">'+

      '<h2>Who should be involved?</h2><p>Big problems rarely have one owner. Select up to four roles that should be part of the response.</p>'+
      '<div class="tray" id="tray3">'+trayHtml+'</div>'+
      '<div class="tray-count">'+selected.length+' / 4 selected</div>'+
      '<div class="role-grid" id="roleGrid3">'+roleCards+'</div>'+
      revealHtml+
      '<div class="btn-row">'+
        (!S.submitted ? '<button class="btn" id="submitBtn3" disabled>Submit team</button>' :
          '<button class="btn" id="nextBtn3">'+(isLast?'See my dashboard →':'Next task →')+'</button>')+
      '</div>'+
      '<div class="center muted-small" style="margin-top:14px;">Task '+(S.idx+1)+' of '+S.tasks3.length+'</div>'+
    '</div>';

  wireStage3();

function wireStage3(){
  var cards = Array.prototype.slice.call(document.querySelectorAll('#roleGrid3 .role-card'));
  var tray = document.getElementById('tray3');
  var submitBtn = document.getElementById('submitBtn3');

  function toggle(rid){
    if(S.submitted) return;
    var i = S._s3sel.indexOf(rid);
    if(i > -1){ S._s3sel.splice(i,1); beep(420,.06,.025); }
    else {
      if(S._s3sel.length >= 4){ showToast('You can select up to 4 roles.'); return; }
      S._s3sel.push(rid); beep(560,.08,.03);
    }
    renderStage3();
  }

  cards.forEach(function(c){
    c.addEventListener('dragstart', function(e){
      c.classList.add('dragging');
      e.dataTransfer.setData('text/plain', c.getAttribute('data-role'));
    });
    c.addEventListener('dragend', function(){ c.classList.remove('dragging'); });
    c.addEventListener('click', function(){ toggle(c.getAttribute('data-role')); });
  });

  tray.addEventListener('dragover', function(e){ if(S.submitted) return; e.preventDefault(); tray.classList.add('dragover'); });
  tray.addEventListener('dragleave', function(){ tray.classList.remove('dragover'); });
  tray.addEventListener('drop', function(e){
    e.preventDefault(); tray.classList.remove('dragover');
    if(S.submitted) return;
    var rid = e.dataTransfer.getData('text/plain');
    if(rid && S._s3sel.indexOf(rid) === -1) toggle(rid);
  });

  Array.prototype.slice.call(tray.querySelectorAll('[data-remove]')).forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      toggle(btn.getAttribute('data-remove'));
    });
  });

  if(submitBtn) submitBtn.disabled = S._s3sel.length === 0;

  if(submitBtn){
    submitBtn.addEventListener('click', function(){
      S.submitted = true;
      S.answers3[S.idx] = { chosen: S._s3sel.slice(), task: S.tasks3[S.idx] };
      beep(760,.14,.05);
      renderAll();
    });
  }
  var nextBtn = document.getElementById('nextBtn3');
  if(nextBtn){
    nextBtn.addEventListener('click', function(){
      S._s3sel = [];
      if(S.idx < S.tasks3.length-1){ S.idx++; S.submitted=false; }
      else { S.stage = 4; celebrate(); }
      renderAll();
    });
  }
}

/* ============================= SCORING ============================= */
function computeScores(){
  // Ownership (stage 1)
  var ownershipTotal = 0;
  var assistPicks = 0;
  S.answers1.forEach(function(a){
    if(a.chosen === a.task.owner) ownershipTotal += 100;
    else if(a.task.assist.indexOf(a.chosen) > -1){ ownershipTotal += 50; assistPicks++; }
  });
  var ownershipScore = Math.round(ownershipTotal / S.answers1.length);

  // Workflow thinking (stage 2)
  var workflowTotal = 0;
  S.answers2.forEach(function(a){
    var correct = 0;
    for(var i=0;i<a.task.route.length;i++){ if(a.order[i]===a.task.route[i]) correct++; }
    workflowTotal += (correct / a.task.route.length) * 100;
  });
  var workflowScore = Math.round(workflowTotal / S.answers2.length);

  // Collaboration + Delegation (stage 3)
  var collabTotal = 0, delegTotal = 0;
  var overAssignSignals = 0, underCollabSignals = 0;
  S.answers3.forEach(function(a){
    var ideal = [a.task.primary].concat(a.task.supporting);
    var chosen = a.chosen;
    var intersection = chosen.filter(function(r){ return ideal.indexOf(r) > -1; });
    var unionSize = (new Set(ideal.concat(chosen))).size;
    var jaccard = unionSize ? (intersection.length / unionSize) : 0;
    collabTotal += jaccard * 100;

    var extras = chosen.filter(function(r){ return ideal.indexOf(r) === -1; }).length;
    if(extras > 0) overAssignSignals++;
    if(chosen.length <= 1) underCollabSignals++;

    var includesPrimary = chosen.indexOf(a.task.primary) > -1 ? 1 : 0;
    var supportMatches = a.task.supporting.filter(function(r){ return chosen.indexOf(r) > -1; }).length;
    var deleg = includesPrimary*50 + (supportMatches / a.task.supporting.length) * 50;
    delegTotal += deleg;
  });
  var collaborationScore = Math.round(collabTotal / S.answers3.length);
  var delegationScore = Math.round(delegTotal / S.answers3.length);

  return {
    ownership: ownershipScore,
    delegation: delegationScore,
    collaboration: collaborationScore,
    workflow: workflowScore,
    assistPicks: assistPicks,
    overAssignSignals: overAssignSignals,
    underCollabSignals: underCollabSignals
  };
}

function buildReflection(sc){
  var lines = [];

  // What understood well
  var best = Math.max(sc.ownership, sc.delegation, sc.collaboration, sc.workflow);
  var bestArea = best===sc.ownership?'spotting who should own a task':
                 best===sc.workflow?'sequencing how work should move between teams':
                 best===sc.collaboration?'recognizing when a problem needs more than one team':
                 'delegating responsibility to the right supporting roles';
  lines.push({label:'What you understood well', text:"Across this shift, you were consistently strongest at "+bestArea+". That instinct is one of the harder parts of organizational thinking to build."});

  // Over-assignment
  if(sc.overAssignSignals >= 2){
    lines.push({label:'Where you tended to over-assign responsibility', text:"In more than one collaboration scenario, you brought in roles beyond the ones most directly involved. That's not necessarily wrong — some ambiguity is healthy — but pulling in every plausible team can dilute ownership and slow a response down."});
  } else if(sc.overAssignSignals === 1){
    lines.push({label:'Where you tended to over-assign responsibility', text:"In one scenario you included a role that wasn't closely tied to the problem. It's a minor pattern, but worth noticing: not every team needs a seat at every table."});
  } else {
    lines.push({label:'Where you tended to over-assign responsibility', text:"You generally kept your teams focused on the roles most relevant to each situation, without spreading responsibility too thin."});
  }

  // Under-collaboration
  if(sc.underCollabSignals >= 2){
    lines.push({label:'Where you underestimated collaboration', text:"More than one complex scenario got a single-role response from you. Problems like a satisfaction drop or a major outage usually surface because of several interacting causes, so they tend to need several teams talking to each other, not one team working alone."});
  } else if(sc.underCollabSignals === 1){
    lines.push({label:'Where you underestimated collaboration', text:"In one scenario you assigned only a single role. It may have felt clear-cut, but even clear-cut problems often benefit from a second perspective."});
  } else {
    lines.push({label:'Where you underestimated collaboration', text:"You tended to bring in multiple perspectives on complex problems, which mirrors how these situations are usually handled in practice."});
  }

  // Insight
  var insights = [
    "Many real workplace problems are solved by teams rather than individuals — ownership tells you who leads, not who works alone.",
    "The order work moves through an organization usually exists for a reason: catching issues earlier is cheaper than catching them later.",
    "A single owner keeps a task from stalling, but the best owners know exactly which teams to pull in and when."
  ];
  var insight = insights[Math.floor(Math.random()*insights.length)];
  lines.push({label:'One insight about how organizations work', text:insight});

  return lines;
}

/* ============================= RESULTS ============================= */
function renderResults(){
  var sc = computeScores();
  var bars = [
    {label:'Ownership', value:sc.ownership, color:'var(--frontend)'},
    {label:'Delegation', value:sc.delegation, color:'var(--product)'},
    {label:'Collaboration', value:sc.collaboration, color:'var(--support)'},
    {label:'Workflow Thinking', value:sc.workflow, color:'var(--qa)'}
  ];
  var barsHtml = bars.map(function(b){
    return '<div class="bar-row"><div class="bar-label-row"><span>'+b.label+'</span><span id="val-'+b.label.replace(/\s/g,'')+'">0%</span></div>'+
      '<div class="bar-track"><div class="bar-fill" data-target="'+b.value+'" style="background:'+b.color+'" id="fill-'+b.label.replace(/\s/g,'')+'"></div></div></div>';
  }).join('');

  var reflection = buildReflection(sc);
  var reflectHtml = reflection.map(function(r){
    return '<div class="reflect-block"><div class="eyebrow">'+r.label+'</div><p>'+r.text+'</p></div>';
  }).join('');

  main.innerHTML =
    '<div class="screen card-panel">'+
      '<div class="eyebrow">Shift Complete</div>'+
      '<h1>Your Organizational Thinking Dashboard</h1>'+
      '<p>This isn\'t a score to chase — it\'s a mirror. Here\'s how your instincts showed up across a full shift at a tech company.</p>'+
      '<div style="margin-top:20px;">'+barsHtml+'</div>'+
      '<h2 style="margin-top:24px;">Final Reflection</h2>'+
      reflectHtml+
      '<div class="btn-row">'+
        '<button class="btn" id="replayBtn">Replay this shift →</button>'+
      '</div>'+
    '</div>';

  document.getElementById('replayBtn').addEventListener('click', resetGame);

  requestAnimationFrame(function(){
    bars.forEach(function(b){
      var key = b.label.replace(/\s/g,'');
      var fillEl = document.getElementById('fill-'+key);
      var valEl = document.getElementById('val-'+key);
      if(fillEl) fillEl.style.width = b.value+'%';
      if(valEl){
        var start=0, target=b.value, dur=1000, t0=performance.now();
        function step(t){
          var p = Math.min(1,(t-t0)/dur);
          valEl.textContent = Math.round(start + (target-start)*p) + '%';
          if(p<1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }
    });
  });
}

function resetGame(){
  S.stage = 0; S.idx = 0; S.submitted = false;
  S.tasks1 = pickN(STAGE1_POOL,3);
  S.tasks2 = pickN(STAGE2_POOL,3);
  S.tasks3 = pickN(STAGE3_POOL,3);
  S.answers1 = []; S.answers2 = []; S.answers3 = [];
  S._s1choice=null; S._s2order=null; S._s2pool=null; S._s3sel=[];
  renderAll();
}

/* ============================= CELEBRATION ============================= */
function celebrate(){
  var layer = document.getElementById('confettiLayer');
  var colors = ['var(--frontend)','var(--backend)','var(--qa)','var(--product)','var(--design)','var(--support)','var(--engmanager)','var(--devops)'];
  for(var i=0;i<40;i++){
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    var size = 6+Math.random()*6;
    p.style.width = size+'px';
    p.style.height = (size*0.4)+'px';
    p.style.left = (Math.random()*100)+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2.2+Math.random()*1.8)+'s';
    p.style.animationDelay = (Math.random()*0.4)+'s';
    layer.appendChild(p);
    (function(el){ setTimeout(function(){ el.remove(); }, 5000); })(p);
  }
  beep(880,.15,.05);
  setTimeout(function(){ beep(1100,.18,.05); }, 140);
}

/* ============================= ROUTER ============================= */
function renderAll(){
  renderProgress();
  if(S.stage===0) renderStart();
  else if(S.stage===1) renderStage1();
  else if(S.stage===2) renderStage2();
  else if(S.stage===3) renderStage3();
  else renderResults();
}

/* ============================= BACKGROUND CANVAS ============================= */
(function(){
  var canvas = document.getElementById('bgCanvas');
  var ctx = canvas.getContext('2d');
  var W,H, nodes=[];
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var palette = ['#5b9ef3','#8b7fe8','#4ecdc4','#f4a340','#f07198','#6edb8f','#e85d5d','#c9a96e'];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function initNodes(){
    var count = Math.max(18, Math.min(42, Math.floor((W*H)/45000)));
    nodes = [];
    for(var i=0;i<count;i++){
      nodes.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.18, vy:(Math.random()-0.5)*0.18,
        r: 1.4+Math.random()*1.8,
        color: palette[Math.floor(Math.random()*palette.length)]
      });
    }
  }
  function step(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      if(!reduceMotion){
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>W) n.vx*=-1;
        if(n.y<0||n.y>H) n.vy*=-1;
      }
    }
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var a=nodes[i], b=nodes[j];
        var dx=a.x-b.x, dy=a.y-b.y;
        var dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < 150){
          ctx.strokeStyle = 'rgba(140,160,200,'+(0.12*(1-dist/150))+')';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
    }
    for(var i=0;i<nodes.length;i++){
      var n = nodes[i];
      ctx.beginPath();
      ctx.fillStyle = n.color;
      ctx.globalAlpha = 0.55;
      ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    if(!reduceMotion) requestAnimationFrame(step);
  }
  window.addEventListener('resize', function(){ resize(); initNodes(); });
  resize(); initNodes(); step();
})();

/* ============================= INIT ============================= */
renderAll();

})();
</script>
